<template>
  <style>
    @font-face {
      font-family: "Inter";
      src: url("assets/fonts/Inter-400.woff2") format("woff2");
      font-weight: 400;
      font-display: block;
    }
    @font-face {
      font-family: "Inter";
      src: url("assets/fonts/Inter-900.woff2") format("woff2");
      font-weight: 900;
      font-display: block;
    }
    @font-face {
      font-family: "JetBrains Mono";
      src: url("assets/fonts/JetBrainsMono-Regular.woff2") format("woff2");
      font-weight: 400;
      font-display: block;
    }
    @font-face {
      font-family: "JetBrains Mono";
      src: url("assets/fonts/JetBrainsMono-Medium.woff2") format("woff2");
      font-weight: 500;
      font-display: block;
    }

    #root {
      position: absolute;
      inset: 0;
      width: 1920px;
      height: 1080px;
      overflow: hidden;
      font-family: "Inter", sans-serif;
      color: #edeef5;

      --surface-0: oklch(0.145 0.015 280);
      --surface-1: oklch(0.17 0.015 280);
      --surface-2: oklch(0.185 0.018 280);
      --surface-3: oklch(0.23 0.02 280);
      --border-subtle: oklch(0.28 0.02 280);
      --ink: oklch(0.95 0.01 280);
      --ink-muted: oklch(0.78 0.015 280);
      --ink-faint: oklch(0.65 0.02 280);
      --accent: oklch(0.62 0.19 277);
      --accent-strong: oklch(0.562 0.199 276.6);
      --danger: oklch(0.68 0.19 25);
      --success: oklch(0.72 0.17 155);
    }

    .f03-bg {
      background: #090910;
    }
    .f03-stage {
      position: absolute;
      inset: 0;
    }

    .f03-kicker {
      color: #8b91f8;
      position: absolute;
      left: 80px;
      top: 80px;
      font-family: "JetBrains Mono", monospace;
      font-size: 28px;
      font-weight: 500;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      white-space: nowrap;
    }
    .f03-stub {
      display: inline-block;
      width: 36px;
      height: 2px;
      background: #5c60e6;
      margin-right: 18px;
      vertical-align: 0.28em;
    }

    .f03-head {
      position: absolute;
      left: 80px;
      top: 172px;
      width: 740px;
      font-size: 96px;
      line-height: 1.06;
      letter-spacing: -0.04em;
      font-weight: 900;
      text-transform: lowercase;
    }
    .f03-tw {
      display: block;
      overflow: hidden;
    }
    .f03-tw span {
      display: block;
      white-space: nowrap;
    }
    .f03-lead {
      position: absolute;
      left: 80px;
      top: 640px;
      width: 620px;
      font-size: 32px;
      line-height: 1.45;
      color: #b5b7c1;
    }

    /* ── the real input row, scaled up so its 11px chrome reads at video size ── */
    .f03-inputwrap {
      position: absolute;
      left: 820px;
      top: 120px;
      width: 1020px;
    }
    .f03-input {
      border: 1px solid var(--border-subtle);
      background: var(--surface-2);
      border-radius: 0;
      padding: 14px 15px 12px;
      transform-origin: 0 0;
    }
    .f03-ph {
      font-size: 15px;
      color: var(--ink-faint);
    }
    .f03-irow {
      margin-top: 14px;
      display: flex;
      align-items: center;
      gap: 9px;
    }
    .f03-ibtn {
      width: 30px;
      height: 30px;
      border-radius: 7px;
      border: 1px solid var(--border-subtle);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .f03-ibtn svg {
      width: 17px;
      height: 17px;
      stroke: var(--ink-faint);
      fill: none;
      stroke-width: 1.6;
    }
    .f03-ibtn.on {
      background: var(--accent-strong);
      border-color: var(--accent-strong);
    }
    .f03-ibtn.on svg {
      stroke: #fff;
    }

    .f03-modelabel {
      position: absolute;
      left: 820px;
      top: 60px;
      font-family: "JetBrains Mono", monospace;
      font-size: 26px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #5c60e6;
    }

    /* tool surface */
    .f03-tools {
      position: absolute;
      left: 820px;
      top: 300px;
      width: 1020px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }
    .f03-tool {
      border: 1px solid var(--border-subtle);
      background: var(--surface-1);
      border-radius: 8px;
      padding: 9px 15px;
      font-family: "JetBrains Mono", monospace;
      font-size: 22px;
      color: var(--ink-muted);
    }
    .f03-tool.off {
      color: var(--ink-faint);
      opacity: 0.45;
      text-decoration: line-through;
      border-style: dashed;
    }
    .f03-tool.hot {
      border-color: var(--accent-strong);
      color: #fff;
    }

    /* plan document */
    .f03-plan {
      position: absolute;
      left: 820px;
      top: 440px;
      width: 1020px;
      height: 210px;
      background: var(--surface-1);
      border: 1px solid var(--border-subtle);
      border-radius: 0;
      padding: 20px 24px;
      box-sizing: border-box;
      font-family: "JetBrains Mono", monospace;
      font-size: 21px;
      line-height: 1.65;
      color: var(--ink-muted);
      overflow: hidden;
      white-space: pre-wrap;
    }
    .f03-caret {
      height: 1em;
      vertical-align: -0.14em;
      display: inline-block;
      width: 11px;
      background: var(--accent);
    }

    /* session handoff */
    .f03-handoff {
      position: absolute;
      left: 820px;
      top: 690px;
      width: 1020px;
      height: 180px;
      display: grid;
      grid-template-columns: 1fr 76px 1fr;
      align-items: stretch;
      gap: 10px;
    }
    .f03-sess {
      border: 1px solid var(--border-subtle);
      background: var(--surface-1);
      border-radius: 0;
      padding: 18px 20px;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
    .f03-sess .t {
      font-family: "JetBrains Mono", monospace;
      font-size: 20px;
      color: var(--ink-faint);
    }
    .f03-sess .m {
      font-size: 24px;
      color: var(--ink-muted);
      line-height: 1.3;
    }
    .f03-sess.fresh {
      border-color: var(--accent-strong);
    }
    .f03-sess.fresh .t {
      color: #6d74f5;
    }
    .f03-sess.fresh .m {
      color: #fff;
    }
    .f03-arrow {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 46px;
      color: #5c60e6;
    }
    .f03-ctxbar {
      margin-top: 10px;
      height: 8px;
      border-radius: 999px;
      background: var(--surface-3);
      overflow: hidden;
    }
    .f03-ctxbar i {
      display: block;
      height: 100%;
      background: var(--ink-faint);
    }
    .f03-sess.fresh .f03-ctxbar i {
      background: var(--success);
    }
  </style>

  <div id="root" data-composition-id="03-modes" data-start="0" data-duration="14.047" data-width="1920" data-height="1080">
    <div class="clip f03-bg" id="03-modes-bg" data-start="0" data-duration="14.047" data-track-index="0" style="position: absolute; inset: 0"></div>

    <div class="clip f03-stage" id="03-modes-stage" data-start="0" data-duration="14.047" data-track-index="1">
      <div class="f03-kicker" id="f03-kicker"><span class="f03-stub"></span>TWO MODES</div>

      <div class="f03-head">
        <span class="f03-tw"><span id="f03-h1">brain.</span></span><span class="f03-tw"><span id="f03-h2">then builder.</span></span>
      </div>

      <div class="f03-lead" id="f03-lead">
        Execution starts clean — it never inherits a context window full of exploration.
      </div>

      <div class="f03-modelabel" id="f03-modelabel">Brain</div>

      <div class="f03-inputwrap" id="f03-inputwrap">
        <div class="f03-input">
          <div class="f03-ph">Write anything… | @file | &lt;tag&gt; | &lt;skill&gt;</div>
          <div class="f03-irow">
            <span class="f03-ibtn"><svg viewBox="0 0 24 24">
                <path d="M4 7h16M4 12h16M4 17h10" /></svg></span>
            <span class="f03-ibtn"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="7" /></svg></span>
            <!-- Brain -->
            <span class="f03-ibtn on" id="f03-btn-brain">
              <svg viewBox="0 0 24 24">
                <path d="M9 4a3 3 0 0 0-3 3 3 3 0 0 0-1 5.5A3 3 0 0 0 8 18a3 3 0 0 0 4 1V4.5A2.5 2.5 0 0 0 9 4Z" />
                <path d="M15 4a3 3 0 0 1 3 3 3 3 0 0 1 1 5.5A3 3 0 0 1 16 18a3 3 0 0 1-4 1" />
              </svg>
            </span>
            <!-- Builder -->
            <span class="f03-ibtn" id="f03-btn-builder">
              <svg viewBox="0 0 24 24">
                <rect x="3" y="8" width="18" height="12" rx="2" />
                <path d="M9 8V6a3 3 0 0 1 6 0v2M3 13h18" />
              </svg>
            </span>
          </div>
        </div>
      </div>

      <div class="f03-tools" id="f03-tools">
        <span class="f03-tool" id="f03-t1">read_file</span>
        <span class="f03-tool" id="f03-t2">semantic_search</span>
        <span class="f03-tool" id="f03-t3">grep</span>
        <span class="f03-tool" id="f03-t4">write_plan</span>
        <span class="f03-tool off" id="f03-t5">edit_file</span>
        <span class="f03-tool off" id="f03-t6">bash</span>
      </div>

      <div class="f03-plan" id="f03-plan"><span id="f03-plantext"></span><span class="f03-caret" id="f03-plancaret"></span></div>

      <div class="f03-handoff" id="f03-handoff">
        <div class="f03-sess" id="f03-s1">
          <div>
            <div class="t">session 1 · brain</div>
            <div class="m">exploration, 41 tool calls</div>
          </div>
          <div class="f03-ctxbar"><i style="width: 86%"></i></div>
        </div>
        <div class="f03-arrow" id="f03-arrow">→</div>
        <div class="f03-sess fresh" id="f03-s2">
          <div>
            <div class="t">session 2 · builder</div>
            <div class="m">the plan, nothing else</div>
          </div>
          <div class="f03-ctxbar"><i style="width: 9%"></i></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    (function () {
      window.__timelines = window.__timelines || {};
      var tl = gsap.timeline({ paused: true });

      gsap.set(["#f03-lead", "#f03-plan", "#f03-handoff"], { autoAlpha: 0 });
      gsap.set(["#f03-t1", "#f03-t2", "#f03-t3", "#f03-t4", "#f03-t5", "#f03-t6"], { autoAlpha: 0 });
      gsap.set("#f03-h2", { autoAlpha: 0 });

      // Scene 1 (0–1.31) — kicker + "Two modes."; the input row lands, Brain lit.
      tl.fromTo("#f03-kicker", { autoAlpha: 0, x: -20 }, { autoAlpha: 1, x: 0, duration: 0.34, ease: "expo.out" }, 0.03);
      tl.fromTo("#f03-h1", { autoAlpha: 0, yPercent: 105, scale: 1.12, transformOrigin: "0% 100%" }, { autoAlpha: 1, yPercent: 0, scale: 1, duration: 0.36, ease: "expo.out" }, 0.37);
      tl.fromTo(
        "#f03-inputwrap",
        { autoAlpha: 0, y: 34 },
        { autoAlpha: 1, y: 0, duration: 0.7, ease: "expo.out" },
        0.5,
      );
      tl.fromTo("#f03-modelabel", { autoAlpha: 0 }, { autoAlpha: 1, duration: 0.4, ease: "none" }, 0.6);

      // Scene 2 (1.31–3.25) — read-only surface expands outward from the toggle.
      // It is visibly SHORT: edit_file and bash are struck out.
      tl.fromTo(
        [".f03-tool"],
        { autoAlpha: 0, y: -14, scale: 0.94 },
        { autoAlpha: 1, y: 0, scale: 1, duration: 0.5, stagger: 0.11, ease: "expo.out" },
        1.31,
      );

      // Scene 3 (3.25–4.59) — the plan types itself. Discrete state schedule,
      // reverse-searched by one linear driver; the display jumps between states.
      tl.fromTo("#f03-plan", { autoAlpha: 0, y: 20 }, { autoAlpha: 1, y: 0, duration: 0.4, ease: "expo.out" }, 3.25);

      var PLAN = [
        { t: 0.0, text: "" },
        { t: 0.12, text: "# Plan" },
        { t: 0.34, text: "# Plan\n1. Seed the builder session" },
        { t: 0.62, text: "# Plan\n1. Seed the builder session from the plan" },
        { t: 0.9, text: "# Plan\n1. Seed the builder session from the plan\n2. Keep exploration out of it" },
        {
          t: 1.15,
          text: "# Plan\n1. Seed the builder session from the plan\n2. Keep exploration out of it\n3. Verify: cargo test --all",
        },
      ];
      var planEl = document.getElementById("f03-plantext");
      var caretEl = document.getElementById("f03-plancaret");
      var lastPlan = null;
      var pd = { t: 0 };
      tl.to(
        pd,
        {
          t: 1.34,
          duration: 1.34,
          ease: "none",
          onUpdate: function () {
            var v = "";
            for (var i = PLAN.length - 1; i >= 0; i--) {
              if (pd.t >= PLAN[i].t) {
                v = PLAN[i].text;
                break;
              }
            }
            if (v !== lastPlan) {
              planEl.textContent = v;
              lastPlan = v;
            }
          },
        },
        3.25,
      );
      var blink = { p: 0 };
      tl.to(
        blink,
        {
          p: Math.PI * 2 * 4,
          duration: 1.34,
          ease: "none",
          onUpdate: function () {
            caretEl.style.opacity = Math.sin(blink.p) > 0 ? "1" : "0";
          },
        },
        3.25,
      );

      // Scene 4 (4.59–5.98) — the toggle HARD-CUTS to Builder at peak velocity;
      // the accent moves with it and the tool surface refills in the same beat.
      tl.set("#f03-btn-brain", { className: "f03-ibtn" }, 4.59);
      tl.set("#f03-btn-builder", { className: "f03-ibtn on" }, 4.59);
      tl.set("#f03-modelabel", { innerText: "Builder" }, 4.59);
      tl.fromTo(
        "#f03-modelabel",
        { autoAlpha: 0.2, x: -10 },
        { autoAlpha: 1, x: 0, duration: 0.28, ease: "expo.out" },
        4.59,
      );
      tl.to("#f03-t5", { autoAlpha: 1, duration: 0.01 }, 4.62);
      tl.to("#f03-t6", { autoAlpha: 1, duration: 0.01 }, 4.62);
      tl.set("#f03-t5", { className: "f03-tool hot" }, 4.62);
      tl.set("#f03-t6", { className: "f03-tool hot" }, 4.72);
      tl.fromTo(
        ["#f03-t5", "#f03-t6"],
        { scale: 0.9 },
        { scale: 1, duration: 0.34, stagger: 0.1, ease: "expo.out" },
        4.62,
      );

      // Scene 5 (5.98–8.95) — the handoff as a real boundary: session 1 ends,
      // session 2 opens carrying only the plan. Scale-swap at one centre.
      tl.fromTo("#f03-handoff", { autoAlpha: 0 }, { autoAlpha: 1, duration: 0.3, ease: "none" }, 5.98);
      tl.fromTo(
        "#f03-s1",
        { autoAlpha: 0, x: -26 },
        { autoAlpha: 1, x: 0, duration: 0.6, ease: "expo.out" },
        5.98,
      );
      tl.fromTo("#f03-arrow", { autoAlpha: 0, scale: 0.7 }, { autoAlpha: 1, scale: 1, duration: 0.5, ease: "expo.out" }, 6.9);
      tl.to("#f03-s1", { opacity: 0.4, scale: 0.965, duration: 0.8, ease: "power3.inOut" }, 7.25);
      tl.fromTo(
        "#f03-s2",
        { autoAlpha: 0, scale: 0.9 },
        { autoAlpha: 1, scale: 1, duration: 0.8, ease: "expo.out" },
        7.4,
      );

      // Scene 6 (8.95–13.547) — the benefit lands, then a long, deliberate hold.
      tl.fromTo("#f03-lead", { autoAlpha: 0, y: 22 }, { autoAlpha: 1, y: 0, duration: 0.7, ease: "expo.out" }, 8.95);
      tl.fromTo("#f03-h2", { autoAlpha: 0, yPercent: 105, scale: 1.12, transformOrigin: "0% 100%" }, { autoAlpha: 1, yPercent: 0, scale: 1, duration: 0.36, ease: "expo.out" }, 4.59);

      var jit = { p: 0 };
      tl.to(
        jit,
        {
          p: Math.PI * 2 * 3,
          duration: 2.4,
          ease: "none",
          onUpdate: function () {
            gsap.set("#f03-s2", { y: Math.sin(jit.p) * 1.5 });
          },
        },
        10.6,
      );

      window.__timelines["03-modes"] = tl;
    })();
  </script>
</template>
