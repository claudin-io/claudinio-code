      gsap.set(["#f05-r1", "#f05-r2", "#f05-r3", "#f05-r4"], { autoAlpha: 0 });
      gsap.set(["#f05-foot", "#f05-kicker", "#f05-head"], { autoAlpha: 0 });
      gsap.set(["#f05-a1", "#f05-a2", "#f05-a3", "#f05-a4"], { autoAlpha: 0 });
      gsap.set(".f05-task", { autoAlpha: 0 });

      // Scene 1 (0–2.72) — the collapsed turn OPENS on "a timeline you can

      tl.fromTo(
        "#f05-turn",
        { height: 74, autoAlpha: 0.85 },
        { height: 795, autoAlpha: 1, duration: 1.2, ease: "expo.out" },
        0.98,

      tl.to("#f05-tri", { rotation: 90, transformOrigin: "50% 50%", duration: 0.45, ease: "expo.out" }, 0.98);

      // Scene 2 (2.72–6.88) — each layer lights exactly as the voice names it:

      function row(sel, at) {
        tl.fromTo(sel, { autoAlpha: 0, x: -16 }, { autoAlpha: 1, x: 0, duration: 0.4, ease: "expo.out" }, at);
      }
      row("#f05-r1", 2.72);
      row("#f05-r2", 3.55);
      row("#f05-r3", 4.36);

      // the tasks block — the artifact the run keeps updating — checks off row
      // by row, which is what "you can open it" actually buys you.
      row("#f05-r4", 4.75);
      tl.fromTo(
        ".f05-task",
        { autoAlpha: 0, x: -12 },
        { autoAlpha: 1, x: 0, duration: 0.32, stagger: 0.14, ease: "expo.out" },
        4.9,
      );

      // one constant-velocity travel down the column — no re-push in the back half
      tl.fromTo("#f05-rows", { y: 0 }, { y: -96, duration: 1.9, ease: "none" }, 4.9);

      tl.fromTo("#f05-foot", { autoAlpha: 0, x: -20 }, { autoAlpha: 1, x: 0, duration: 0.34, ease: "expo.out" }, 5.41);

      // Scene 3 (6.88–8.49) — four subagents fan out, staggered by index

      tl.fromTo(
        ["#f05-a1", "#f05-a2", "#f05-a3", "#f05-a4"],
        { autoAlpha: 0, x: 60, scale: 0.94 },
        { autoAlpha: 1, x: 0, scale: 1, duration: 0.38, stagger: 0.15, ease: "expo.out" },
        6.88,
      );

      // Scene 4 (8.49–10.069) — "each keeps its own": the status dots pulse
      // through once, finite, then the whole frame holds still.
      var p = { v: 0 };
      tl.to(
        p,
        {
          v: Math.PI * 2,
          duration: 1.1,
          ease: "none",
          onUpdate: function () {
            var a = 0.45 + 0.55 * Math.abs(Math.sin(p.v));
            gsap.set(".f05-ag .sdot", { opacity: a });
          },
        },
        8.49,
      );

      window.__timelines["05-timeline"] = tl;
