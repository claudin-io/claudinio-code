name: Feature request
description: Suggest a capability or an improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: The problem
      description: What are you trying to do that the app makes hard or impossible? Describe the problem before the solution.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: What you have in mind
      description: Optional. A sketch of the behaviour you would want.

  - type: textarea
    id: alternatives
    attributes:
      label: What you do today
      description: Workarounds you use, or how other tools handle it.

  - type: checkboxes
    id: contribute
    attributes:
      label: Contribution
      options:
        - label: I would be willing to implement this
