name: Release

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  # Only release tags strictly newer than the last version shipped before this
  # guard existed. Legacy tags (v0.1.0 .. v0.1.15) and any accidental re-push of
  # an old tag are skipped, not built — so `git push --tags` can never re-release
  # a historical version. Bump RELEASE_FLOOR only if you ever need to re-open an
  # older line; normal releases just keep climbing above it.
  guard:
    name: Guard (new tags only)
    runs-on: ubuntu-latest
    env:
      RELEASE_FLOOR: '0.1.15'
    outputs:
      proceed: ${{ steps.check.outputs.proceed }}
    steps:
      - name: Check tag is newer than the floor
        id: check
        shell: bash
        run: |
          VER="${{ github.ref_name }}"
          VER="${VER#v}"
          FLOOR="${RELEASE_FLOOR}"
          highest="$(printf '%s\n%s\n' "$VER" "$FLOOR" | sort -V | tail -1)"
          if [ "$VER" != "$FLOOR" ] && [ "$highest" = "$VER" ]; then
            echo "proceed=true" >> "$GITHUB_OUTPUT"
            echo "✅ $VER > $FLOOR — proceeding with release."
          else
            echo "proceed=false" >> "$GITHUB_OUTPUT"
            echo "⏭️  $VER is not newer than the floor ($FLOOR) — skipping release."
          fi

  build:
    name: Build ${{ matrix.platform }}
    needs: guard
    if: needs.guard.outputs.proceed == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            os: windows-latest
            bundle-args: ''
            artifact-name: Claudinio-Code-Windows-x64
            bundle-path: src-tauri/target/release/bundle/

          # macOS Apple Silicon only (Intel macOS dropped due to runner availability)
          - platform: macos-arm64
            target: aarch64-apple-darwin
            os: macos-latest
            bundle-args: ''
            artifact-name: Claudinio-Code-macOS-arm64
            bundle-path: src-tauri/target/release/bundle/

          - platform: linux-x64
            target: x86_64-unknown-linux-gnu
            os: ubuntu-24.04
            bundle-args: ''
            artifact-name: Claudinio-Code-Linux-x64
            bundle-path: src-tauri/target/release/bundle/

          # Windows ARM64 — cross-compilado do runner x64
          - platform: windows-arm64
            target: aarch64-pc-windows-msvc
            os: windows-latest
            bundle-args: '--target aarch64-pc-windows-msvc --bundles nsis'
            artifact-name: Claudinio-Code-Windows-arm64
            bundle-path: src-tauri/target/aarch64-pc-windows-msvc/release/bundle/

          # Linux ARM64 — via runner nativo ARM64
          - platform: linux-arm64
            target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            bundle-args: ''
            artifact-name: Claudinio-Code-Linux-arm64
            bundle-path: src-tauri/target/release/bundle/

    runs-on: ${{ matrix.os }}
    environment: RELEASE

    env:
      CARGO_INCREMENTAL: 0
      RUST_BACKTRACE: short

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libxdo-dev \
            libssl-dev \
            xdg-utils
          # libappindicator3-dev foi removido do Ubuntu 24.04 (Noble);
          # libayatana-appindicator3-dev é o sucessor. O crate Rust
          # libappindicator-sys ainda procura por 'libappindicator3' no
          # pkg-config, então criamos um symlink de compatibilidade.
          if [ -f /usr/lib/$(uname -m)-linux-gnu/pkgconfig/ayatana-appindicator3-0.1.pc ]; then
            sudo ln -sf \
              /usr/lib/$(uname -m)-linux-gnu/pkgconfig/ayatana-appindicator3-0.1.pc \
              /usr/lib/$(uname -m)-linux-gnu/pkgconfig/appindicator3-0.1.pc 2>/dev/null || true
          fi

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      # Bundled as a Tauri resource so semantic search works 100% offline
      # from first launch — the runtime HF download is only a fallback.
      - name: Fetch embedding model
        shell: bash
        run: python3 scripts/fetch_embedding_model.py

      - name: Determine version from tag
        id: version
        shell: bash
        run: |
          TAG="${{ github.ref_name }}"
          TAG="${TAG#v}"
          echo "version=$TAG" >> "$GITHUB_OUTPUT"
          echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"

      - name: Set up MSVC ARM64 cross-compilation tools
        if: matrix.target == 'aarch64-pc-windows-msvc'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64_arm64

      - name: Add Rust ARM64 target
        if: matrix.target == 'aarch64-pc-windows-msvc'
        shell: bash
        run: rustup target add aarch64-pc-windows-msvc

      - name: Set Windows linker flags
        if: runner.os == 'Windows'
        shell: bash
        run: |
          # ort's prebuilt onnxruntime uses the dynamic CRT (/MD, msvcprt), which is
          # also the MSVC default for Rust. Keep the whole build on /MD so nothing
          # pulls the static C++ runtime (libcpmt) and duplicates its symbols
          # (LNK2005/LNK1169). The other C++ CRT outlier, esaxx-rs, is removed by
          # dropping tokenizers' esaxx_fast feature (see src-tauri/Cargo.toml).
          echo "RUSTFLAGS=-Ctarget-feature=-crt-static" >> "$GITHUB_ENV"

      - name: Import Apple Developer Certificate
        if: runner.os == 'macOS'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12

          # Create and configure the keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain

          # Import the certificate
          security import certificate.p12 -k build.keychain \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/productbuild

          # Grant permission for codesign to use this identity
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" build.keychain

          # Verify the import
          security find-identity -v -p codesigning build.keychain
        shell: bash

      - name: Resolve Apple Signing Identity
        if: runner.os == 'macOS'
        shell: bash
        run: |
          # List all identities for debugging
          echo "=== Available signing identities ==="
          security find-identity -v -p codesigning build.keychain

          # Try to find a Developer ID Application certificate first
          CERT_INFO=$(security find-identity -v -p codesigning build.keychain \
            | grep "Developer ID Application" | head -n 1 || true)
          CERT_ID=$(echo "$CERT_INFO" | awk -F'"' '{print $2}')

          if [ -z "$CERT_ID" ]; then
            echo "⚠️  Developer ID Application not found — falling back to first identity"
            CERT_INFO=$(security find-identity -v -p codesigning build.keychain \
              | grep -E '^[[:space:]]*[0-9]+\)' | head -n 1 || true)
            CERT_ID=$(echo "$CERT_INFO" | awk -F'"' '{print $2}')
          fi

          if [ -z "$CERT_ID" ]; then
            echo "❌ No signing identities found in keychain. Will attempt to build without signing."
          else
            echo "APPLE_SIGNING_IDENTITY=$CERT_ID" >> "$GITHUB_ENV"
            echo "✅ Using signing identity: $CERT_INFO"
          fi

      - name: Build Tauri app
        run: pnpm tauri build ${{ matrix.bundle-args }}
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_SIGNING_IDENTITY: ${{ env.APPLE_SIGNING_IDENTITY }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact-name }}-${{ steps.version.outputs.version }}
          path: ${{ matrix.bundle-path }}

  create-release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-22.04
    environment: RELEASE
    permissions:
      contents: write
      actions: write    # needed for gh cache delete

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Determine version
        id: version
        shell: bash
        run: |
          TAG="${{ github.ref_name }}"
          TAG="${TAG#v}"
          echo "version=$TAG" >> "$GITHUB_OUTPUT"
          echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"

      - name: Download all build artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: Claudinio-Code-*
          merge-multiple: false

      - name: Collect release files
        shell: bash
        run: |
          mkdir -p release-files
          find . -type d -name 'Claudinio-Code-*' | while read dir; do
            name=$(basename "$dir")
            find "$dir" -type f \( -name '*.msi' -o -name '*.exe' -o -name '*.dmg' -o -name '*.deb' -o -name '*.AppImage' -o -name '*.tar.gz' -o -name '*.tar.xz' -o -name '*.sig' \) | while read file; do
              # Spaces break updater URLs and GitHub renames assets anyway;
              # sanitize here so latest.json can predict the final asset name.
              base=$(basename "$file" | tr ' ' '.')
              cp "$file" "release-files/${name}-${base}"
            done
          done
          echo "=== Collected release files ==="
          ls -lh release-files/

      - name: Generate updater manifest (latest.json)
        shell: bash
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          VERSION="${{ steps.version.outputs.version }}"
          BASE_URL="https://github.com/claudin-io/claudinio-code-releases/releases/download/${TAG}"

          asset() {
            # $1 = include glob, $2 = optional exclude glob
            if [ -n "${2:-}" ]; then
              find release-files -type f -name "$1" ! -name "$2" ! -name '*.sig' | head -n1
            else
              find release-files -type f -name "$1" ! -name '*.sig' | head -n1
            fi
          }

          platforms='{}'
          add_platform() {
            local key="$1" file="$2"
            if [ -z "$file" ] || [ ! -f "${file}.sig" ]; then
              echo "⚠️  Missing updater artifact or .sig for $key — skipping"
              return
            fi
            local name sig
            name=$(basename "$file")
            sig=$(cat "${file}.sig")
            platforms=$(echo "$platforms" | jq \
              --arg k "$key" --arg url "$BASE_URL/$name" --arg sig "$sig" \
              '.[$k] = {url: $url, signature: $sig}')
          }

          add_platform "darwin-aarch64" "$(asset '*macOS*.app.tar.gz')"
          add_platform "windows-x86_64" "$(asset '*Windows*-setup.exe' '*arm64*')"
          add_platform "windows-aarch64" "$(asset '*Windows-arm64*.exe')"
          add_platform "linux-x86_64"   "$(asset '*Linux*.AppImage' '*arm64*')"
          add_platform "linux-aarch64"  "$(asset '*Linux-arm64*.AppImage')"

          # Guard: x86_64 entries must never point at arm64 artifacts
          for key in windows-x86_64 linux-x86_64; do
            url=$(echo "$platforms" | jq -r --arg k "$key" '.[$k].url // ""')
            case "$url" in
              *arm64*) echo "❌ $key URL points at an arm64 artifact: $url"; exit 1 ;;
            esac
          done

          jq -n \
            --arg version "$VERSION" \
            --arg pub_date "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --argjson platforms "$platforms" \
            '{version: $version, pub_date: $pub_date, platforms: $platforms}' \
            > release-files/latest.json

          echo "=== latest.json ==="
          jq '.platforms |= with_entries(.value.signature = "<sig>")' release-files/latest.json

      - name: Generate release notes
        id: notes
        shell: bash
        run: |
          CURRENT_TAG="${{ github.ref_name }}"
          PREV_TAG=""

          # Find the previous version tag (sorted by version, descending)
          while IFS= read -r tag; do
            [ "$tag" = "$CURRENT_TAG" ] && continue
            PREV_TAG="$tag"
            break
          done <<< "$(git tag --sort=-v:refname | grep -E '^v?[0-9]+\.[0-9]+\.[0-9]+$')"

          NOTES_FILE="release-notes.md"
          {
            echo "## Claudinio Code v${{ steps.version.outputs.version }}"
            echo ""
            if [ -n "$PREV_TAG" ]; then
              echo "### Changes since $PREV_TAG"
            else
              echo "### Initial Release"
            fi
            echo ""
            if [ -n "$PREV_TAG" ]; then
              git log "$PREV_TAG"..HEAD --oneline --no-merges --format="* %h %s"
            else
              git log HEAD --oneline --no-merges --format="* %h %s"
            fi
            echo ""
            echo "### Downloads"
            echo ""
            echo "| Platform | File |"
            echo "|----------|------|"
            echo "| Windows (x64) | \`Claudinio-Code-Windows-x64-*.msi\` / \`*.exe\` |"
            echo "| Windows (ARM64) | \`Claudinio-Code-Windows-arm64-*.exe\` |"
            echo "| macOS (Apple Silicon) | \`Claudinio-Code-macOS-arm64-*.dmg\` |"
            echo "| Linux (x64) | \`Claudinio-Code-Linux-x64-*.deb\` / \`*.AppImage\` |"
            echo "| Linux (ARM64) | \`Claudinio-Code-Linux-arm64-*.deb\` / \`*.AppImage\` |"
            echo ""
            echo "---"
            echo ""
            echo "*Built with [Tauri v2](https://v2.tauri.app)*"
          } > "$NOTES_FILE"
          echo "notes_path=$NOTES_FILE" >> "$GITHUB_OUTPUT"

      # Published on the public releases repo so the in-app updater can fetch
      # latest.json and installers without auth (this source repo is private).
      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          repository: claudin-io/claudinio-code-releases
          token: ${{ secrets.RELEASES_REPO_TOKEN }}
          tag_name: ${{ steps.version.outputs.tag }}
          name: Claudinio Code v${{ steps.version.outputs.version }}
          body_path: ${{ steps.notes.outputs.notes_path }}
          files: release-files/*
          draft: false
          prerelease: false
          fail_on_unmatched_files: true

      - name: Clear GitHub Actions caches
        shell: bash
        run: gh cache delete --all
        env:
          GH_TOKEN: ${{ github.token }}
