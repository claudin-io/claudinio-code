name: CI

on:
  pull_request:
  push:
    branches: [main]

# No secrets are used by this workflow, so it is safe to run on fork PRs.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  frontend:
    name: Frontend (typecheck + tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm exec tsc --noEmit

      - name: Test
        run: pnpm exec vitest run

  rust:
    name: Rust (fmt + clippy + tests)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libxdo-dev \
            libssl-dev \
            xdg-utils \
            ripgrep
          # libappindicator3-dev was dropped in Ubuntu 24.04 (Noble);
          # libappindicator-sys still looks for 'libappindicator3' via
          # pkg-config, so provide a compatibility symlink.
          if [ -f /usr/lib/$(uname -m)-linux-gnu/pkgconfig/ayatana-appindicator3-0.1.pc ]; then
            sudo ln -sf \
              /usr/lib/$(uname -m)-linux-gnu/pkgconfig/ayatana-appindicator3-0.1.pc \
              /usr/lib/$(uname -m)-linux-gnu/pkgconfig/appindicator3-0.1.pc
          fi

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      # tauri_build resolves frontendDist (../dist) at compile time, so the
      # frontend has to be built before anything touches the Rust crate.
      - name: Build frontend
        run: |
          pnpm install --frozen-lockfile
          pnpm exec vite build

      # tauri.conf.json bundles models/all-MiniLM-L6-v2/* as a resource, so the
      # build script's glob fails unless the model is present. Fetch it before
      # anything compiles the crate (clippy/test run the build script).
      - name: Fetch embedding model
        shell: bash
        run: python3 scripts/fetch_embedding_model.py

      - name: Format
        working-directory: src-tauri
        run: cargo fmt --all --check

      - name: Clippy
        working-directory: src-tauri
        run: cargo clippy --all-targets -- -D warnings

      - name: Test
        working-directory: src-tauri
        run: cargo test
