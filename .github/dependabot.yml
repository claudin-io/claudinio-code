version: 2
updates:
  - package-ecosystem: cargo
    directory: /src-tauri
    schedule:
      interval: monthly
    open-pull-requests-limit: 5
    groups:
      # 77 tree-sitter grammars would otherwise flood the PR queue.
      tree-sitter:
        patterns: ["tree-sitter*"]

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 5

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
